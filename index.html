<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>多元宇宙系统 — 在线阅读</title>
<link rel="stylesheet" href="assets/css/site.css">
</head>
<body>

<header>
  <button class="logo" id="home-link" type="button">📖 多元宇宙系统</button>
  <nav id="nav"></nav>
</header>

<main>
  <div id="content"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/marked@4/marked.min.js"></script>
<script>
// ===== 章节注册表 =====
const chapters = [
  { file: '1.md', title: '第一章 觉醒·多元宇宙系统' },
  { file: '2.md', title: '第二章 新手礼包·多元宇宙道具系统' },
];

// ===== marked v4 配置：允许 HTML（<font> 颜色标签直通） =====
marked.setOptions({
  breaks: true,
  gfm: true,
  sanitize: false,   // v4 默认 false，明确声明确保 HTML 不被转义
  mangle: false,
  headerIds: false,
});

// ===== 路由 =====
function getHash() {
  return decodeURIComponent(location.hash.replace('#', ''));
}

function goHome() {
  location.hash = '';
  renderHome();
}

function renderNav(activeFile) {
  const nav = document.getElementById('nav');
  nav.innerHTML = chapters.map((ch, i) => {
    const cls = ch.file === activeFile ? 'active' : '';
    return `<a class="${cls}" href="#${ch.file}">${'第' + (i + 1) + '章'}</a>`;
  }).join('');
}

function renderHome() {
  renderNav('');
  const list = chapters.map((ch, i) =>
    `<li><a href="#${ch.file}"><span class="ch-num">${String(i + 1).padStart(2, '0')}</span>${ch.title}</a></li>`
  ).join('');
  document.getElementById('content').innerHTML =
    `<h1 style="color:var(--accent);border:none;margin-bottom:8px;font-size:32px;">多元宇宙系统</h1>
     <p style="color:var(--text-muted);margin-bottom:32px;">星际联邦 · 基因觉醒 · 万界征途</p>
     <ul class="chapter-list">${list}</ul>`;
}

async function renderChapter(file) {
  const idx = chapters.findIndex(c => c.file === file);
  if (idx === -1) { renderHome(); return; }
  renderNav(file);
  try {
    const resp = await fetch(file);
    if (!resp.ok) throw new Error(resp.status);
    const md = await resp.text();
    // marked 解析并保留内联 HTML
    const html = marked.parse(md);
    <script>
    marked.setOptions({
      breaks: true,
      gfm: true,
    });
    </script>
    <script type="module" src="assets/js/app.js"></script>
    margin-right: 8px;
